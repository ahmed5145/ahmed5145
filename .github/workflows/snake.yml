name: Generate Snake

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-readme-updates
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ahmed5145
          outputs: |
            assets/github-snake.svg
            assets/github-snake-dark.svg?palette=github-dark

      - name: Commit snake assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-snake.svg assets/github-snake-dark.svg
          if git diff --staged --quiet; then
            echo "No snake changes to commit."
            exit 0
          fi
          git commit -m "chore: update contribution snake"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main
            git push origin main && exit 0
            echo "Push failed, retrying in 10s (attempt ${attempt}/5)..."
            sleep 10
          done
          echo "Failed to push snake assets after 5 attempts."
          exit 1
