name: Update Waka Stats

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Waka section
        uses: athul/waka-readme@master
        with:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
