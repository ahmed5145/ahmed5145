name: Generate Profile Stats

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-readme-updates
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Ensure assets directory exists
        run: mkdir -p assets

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: stats
          options: username=ahmed5145&show_icons=true&theme=transparent&hide_rank=true&hide=commits,contribs&count_private=true&bg_color=0d1117&border_color=30363d&title_color=58a6ff&text_color=c9d1d9&icon_color=58a6ff
          path: assets/stats.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=ahmed5145&layout=compact&theme=transparent&langs_count=6&hide=html,css,TeX,Cython&card_width=450&bg_color=0d1117&border_color=30363d&title_color=58a6ff&text_color=c9d1d9
          path: assets/top-langs.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate streak card
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=ahmed5145&theme=github-dark&hide_border=true
          path: assets/streak.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Commit stats assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg assets/top-langs.svg assets/streak.svg
          if git diff --staged --quiet; then
            echo "No stats changes to commit."
            exit 0
          fi
          git commit -m "chore: update profile stats"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main
            git push origin main && exit 0
            echo "Push failed, retrying in 10s (attempt ${attempt}/5)..."
            sleep 10
          done
          echo "Failed to push stats assets after 5 attempts."
          exit 1
