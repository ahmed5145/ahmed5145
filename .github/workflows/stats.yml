name: Generate Profile Stats

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate stats cards
        uses: stats-organization/github-readme-stats-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: ahmed5145
          output_dir: assets
          cards: stats,top-langs
          stats_options: "show_icons=true&theme=tokyonight&count_private=true&include_all_commits=true"
          top_langs_options: "layout=compact&theme=tokyonight&langs_count=8&hide=html,css"

      - name: Commit stats assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg assets/top-langs.svg
          git diff --staged --quiet || git commit -m "chore: update profile stats"
          git push
